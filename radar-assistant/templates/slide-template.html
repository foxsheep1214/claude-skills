<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPLACE_TITLE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  font-size: 13pt;
  line-height: 1.8;
  color: #1a1a1a;
  background: #f5f5f5;
}
.slide {
  scroll-snap-align: start;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 80px;
  page-break-after: always;
}
.slide-content {
  max-width: 900px;
  width: 100%;
  background: white;
  border-radius: 8px;
  padding: 50px 60px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.08);
}
.slide.cover { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
.slide.cover .slide-content { background: transparent; box-shadow: none; color: white; text-align: center; }
.slide.cover h1 { font-size: 32pt; border: none; margin-bottom: 20px; }
.slide.cover .subtitle { font-size: 14pt; opacity: 0.7; margin: 10px 0; }
.slide.section { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
.slide.section .slide-content { background: transparent; box-shadow: none; color: white; text-align: center; }
.slide.section h1 { font-size: 28pt; border: none; }
h1 { font-size: 22pt; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 10px; }
h2 { font-size: 16pt; margin: 20px 0 12px; color: #333; }
h3 { font-size: 13pt; margin: 15px 0 8px; color: #555; }
blockquote { border-left: 3px solid #0f3460; padding-left: 15px; color: #555; margin: 12px 0; }
strong { color: #c00; }
table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 11pt; }
th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
th { background: #f0f0f0; font-weight: bold; }
tr:nth-child(even) { background: #fafafa; }
code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-family: "SF Mono", "Consolas", monospace; font-size: 0.9em; }
ul, ol { margin: 8px 0; padding-left: 24px; }
li { margin: 4px 0; }
.nav { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
.nav button { width: 40px; height: 40px; border: none; border-radius: 50%; background: #0f3460; color: white; font-size: 18px; cursor: pointer; opacity: 0.7; }
.nav button:hover { opacity: 1; }
.nav .page-num { display: flex; align-items: center; color: #666; font-size: 11pt; }
@media print { .slide { min-height: auto; padding: 30px 40px; } .nav { display: none; } body { background: white; } html { scroll-snap-type: none; } }
</style>
</head>
<body>
$body$
<div class="nav">
  <span class="page-num" id="page-num"></span>
  <button onclick="window.scrollBy(0, -window.innerHeight)" title="上一页">&#9650;</button>
  <button onclick="window.scrollBy(0, window.innerHeight)" title="下一页">&#9660;</button>
</div>
<script>
const slides = document.querySelectorAll('.slide');
function updatePage() {
  let current = 1;
  const scrollTop = window.scrollY + window.innerHeight / 2;
  slides.forEach((s, i) => { if (s.offsetTop <= scrollTop) current = i + 1; });
  document.getElementById('page-num').textContent = current + ' / ' + slides.length;
}
window.addEventListener('scroll', updatePage);
updatePage();
</script>
</body>
</html>
